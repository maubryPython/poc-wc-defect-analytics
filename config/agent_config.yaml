# ─────────────────────────────────────────────────────────────────────────────
# Agent Configuration — Nike WC Defect Analytics POC
# Edit thresholds here; agents read this file at runtime via config_read tool.
# ─────────────────────────────────────────────────────────────────────────────

detection:
  # Anomaly score thresholds (Z-score multiples above supplier baseline)
  flag_threshold: 2.0          # Defect rate > this SD above baseline → FLAGGED
  borderline_low: 1.5          # Between borderline_low and flag_threshold → run secondary lookup
  min_units_inspected: 50      # Ignore inspections with fewer units than this
  methods:                     # Detection methods to run (both used; higher score wins)
    - zscore
    - isolation_forest

rca:
  confidence_threshold: 0.70   # RCA top hypothesis must exceed this to auto-trigger Summary Agent
  insufficient_threshold: 0.50 # All hypotheses below this → INSUFFICIENT_EVIDENCE + escalate
  max_sources_to_query: 3      # Max data sources agent queries per investigation
  llm_model: "mistralai/Mistral-7B-Instruct-v0.2"   # HuggingFace model ID
  llm_max_tokens: 512

summary:
  severity_unit_threshold: 5000   # Units flagged above this → proactive briefing triggered
  severity_rate_threshold: 0.03   # OR defect rate above this → proactive briefing triggered
  max_briefing_words: 300
  llm_model: "mistralai/Mistral-7B-Instruct-v0.2"
  llm_max_tokens: 768

scenario:
  n_simulations: 1000          # Monte Carlo iterations
  scenarios:
    do_nothing:
      description: "No intervention. Accept ongoing returns and brand impact."
      recall_cost_per_unit_usd: 0
      discount_pct: 0
      logistics_cost_usd: 0
    partial_remediation:
      description: "Targeted batch recall + 20% discount on remaining inventory."
      recall_cost_per_unit_usd: 12
      discount_pct: 0.20
      logistics_cost_usd: 250000
    full_recall:
      description: "Full recall of all World Cup jerseys. Replace with revised design."
      recall_cost_per_unit_usd: 18
      discount_pct: 0
      logistics_cost_usd: 850000

orchestrator:
  poll_interval_minutes: 15        # How often the scheduled job checks the landing zone
  max_agent_retries: 2             # Retries before escalating a failed agent
  escalation_table: "escalation_queue"
  run_log_table: "run_log"

pipeline:
  landing_zone_path: "/dbfs/mnt/landing"
  silver_database: "silver"
  gold_database: "gold"
  bad_records_table: "bad_records"
  quarantine_failure_rate: 0.30    # File-level quarantine if > 30% rows fail validation
